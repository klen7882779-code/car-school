<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第一汽車駕訓班 — 名額查詢</title>
<style>
  :root { --p:#1A1916; --acc:#27ae60; --bg:#F4F3EF; --c:#FFF; --b:#E0DDD5; }
  body { font-family:sans-serif; background:var(--bg); margin:0; padding:0; color:#333; }
  .header { background:var(--p); color:#fff; padding:18px; text-align:center; position:sticky; top:0; z-index:100; }
  .controls { background:var(--c); padding:12px; border-bottom:1px solid var(--b); display:flex; justify-content:center; gap:8px; position:sticky; top:65px; z-index:90; }
  .pill { padding:6px 14px; border-radius:20px; border:1px solid var(--b); background:#fff; cursor:pointer; font-size:12px; font-weight:600; }
  .pill.active { background:var(--p); color:#fff; border-color:var(--p); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:15px; padding:15px; max-width:1100px; margin:auto; }
  .card { background:var(--c); border:1px solid var(--b); border-radius:12px; padding:15px; border-top:5px solid var(--acc); }
  .coach-t { font-size:17px; font-weight:bold; border-bottom:1px solid #eee; padding-bottom:8px; margin-bottom:12px; }
  .slot { background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:8px; }
  .slot-time { font-size:11px; font-weight:bold; color:#666; margin-bottom:6px; display:block; }
  .stat { display:flex; justify-content:space-between; }
  .rem { font-weight:bold; font-size:15px; }
  .rem-ok { color:#27ae60; }
  .rem-full { color:#c0392b; }
  .label { font-size:10px; background:#666; color:#fff; padding:2px 5px; border-radius:3px; margin-right:5px; }
</style>
</head>
<body>
<div class="header"><h2 style="margin:0">🚗 第一汽車駕訓班 — 名額查詢</h2></div>
<div class="controls">
  <button class="pill active" id="btnA" onclick="sw('cohort','A')">A 梯次</button>
  <button class="pill" id="btnB" onclick="sw('cohort','B')">B 梯次</button>
  <div style="width:1px; background:#ddd; height:20px; margin:0 5px"></div>
  <button class="pill active" id="btnWD" onclick="sw('day','WD')">平日</button>
  <button class="pill" id="btnWE" onclick="sw('day','WE')">假日</button>
</div>
<div id="content"></div>

<script>
const SHEET_ID = '1ZbOb5Ac8XEG0hoaNPs1wFdm5iWyi7XouBDZOP6Z6D7I';
const CONFIG_GID = '1565459234';
const WD_KEYS = ["06:00", "08:30", "10:00", "12:00", "13:30", "15:30", "18:30", "19:00"];
const WE_KEYS = ["08:30–12:30", "13:30–17:30"];

let coaches = [], allData = {}, cohort = 'A', dayType = 'WD';

async function fetchSheet(gid, tq) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&tq=${encodeURIComponent(tq)}&gid=${gid}`;
  const res = await fetch(url);
  const text = await res.text();
  return JSON.parse(text.substring(47, text.length - 2)).table.rows;
}

function isOccupied(val) {
  return val && val !== "" && val !== "-" && val !== "—" && val !== "──" && val !== "0";
}

async function load() {
  try {
    const cfgRows = await fetchSheet(CONFIG_GID, "select B, C, D, F");
    coaches = cfgRows.map(r => ({
      name: (r.c[0]?.v || '').toString().trim(),
      cohort: (r.c[1]?.v || '').toString().includes('A') ? 'A' : 'B',
      type: (r.c[2]?.v || 'WDWE').toString().toUpperCase(),
      cap: parseInt(r.c[3]?.v) || 4
    })).filter(c => c.name && c.name !== '教練姓名');

    await Promise.all(coaches.map(async (c) => {
      try {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(c.name)}&range=A1:L50`;
        const res = await fetch(url);
        const text = await res.text();
        const rows = JSON.parse(text.substring(47, text.length - 2)).table.rows;
        allData[c.name] = rows.map(r => (r.c || []).map(cell => (cell?.f || cell?.v || '').toString().trim()));
      } catch (e) { console.error(c.name); }
    }));
    render();
  } catch (e) { console.error(e); }
}

function render() {
  const keys = dayType === 'WD' ? WD_KEYS : WE_KEYS;
  const filtered = coaches.filter(c => c.cohort === cohort && c.type.includes(dayType));
  let html = '<div class="grid">';

  filtered.forEach(c => {
    const grid = allData[c.name] || [];
    let slotsHtml = '';

    keys.forEach(k => {
      let aUsed = 0, mUsed = 0;
      let found = false, label = k;

      for (let i = 0; i < grid.length; i++) {
        const rowA = grid[i][0] || "";
        if (rowA.includes(k)) { found = true; label = rowA; }
        else if (found && rowA !== "") { break; }

        if (found) {
          // 平日掃描 5 天，假日掃描 2 天
          const days = dayType === 'WD' ? 5 : 2;
          for (let d = 0; d < days; d++) {
            // 自排在 C, E, G, I, K (索引 2, 4, 6, 8, 10)
            if (isOccupied(grid[i][2 + (d * 2)])) aUsed++;
            // 手排在 D, F, H, J, L (索引 3, 5, 7, 9, 11)
            if (isOccupied(grid[i][3 + (d * 2)])) mUsed++;
          }
        }
      }

      const aR = Math.max(0, c.cap - aUsed), mR = Math.max(0, c.cap - mUsed);
      slotsHtml += `<div class="slot">
        <span class="slot-time">🕒 ${label}</span>
        <div class="stat">
          <span><span class="label" style="background:#3498db">自</span><span class="rem ${aR===0?'rem-full':'rem-ok'}">${aR===0?'滿':'剩 '+aR}</span></span>
          <span><span class="label" style="background:#e67e22">手</span><span class="rem ${mR===0?'rem-full':'rem-ok'}">${mR===0?'滿':'剩 '+mR}</span></span>
        </div>
      </div>`;
    });
    html += `<div class="card"><div class="coach-t">👤 ${c.name} 教練</div>${slotsHtml}</div>`;
  });
  document.getElementById('content').innerHTML = html + '</div>';
}
function sw(k,v){ if(k==='cohort')cohort=v; else dayType=v; render(); }
load();
</script>
</body>
</html>
