<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第一駕訓班 — 名額查詢</title>
<style>
  :root { --p:#1A1916; --acc:#27ae60; --bg:#F4F3EF; --c:#FFF; --b:#E0DDD5; }
  body { font-family:sans-serif; background:var(--bg); margin:0; padding:0; color:#333; }
  .header { background:var(--p); color:#fff; padding:15px; text-align:center; position:sticky; top:0; z-index:100; }
  .controls { background:var(--c); padding:10px; border-bottom:1px solid var(--b); text-align:center; position:sticky; top:60px; z-index:90; }
  .btn-group { display:flex; gap:5px; justify-content:center; margin-bottom:8px; flex-wrap:wrap; }
  .pill { padding:6px 14px; border-radius:20px; border:1px solid var(--b); background:#fff; cursor:pointer; font-size:12px; font-weight:600; }
  .pill.active { background:#e67e22; color:#fff; border-color:#e67e22; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:15px; padding:15px; max-width:1100px; margin:auto; }
  .card { background:var(--c); border-radius:12px; padding:15px; border-top:5px solid var(--p); box-shadow:0 2px 8px rgba(0,0,0,0.1); }
  .coach-t { font-size:17px; font-weight:bold; border-bottom:1px solid #eee; padding-bottom:8px; margin-bottom:12px; }
  .slot { background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:8px; }
  .stat { display:flex; justify-content:space-between; align-items:center; }
  .rem { font-weight:bold; font-size:15px; }
  .ok { color:#27ae60; }
  .full { color:#e74c3c; font-weight:900; }
  .label { font-size:10px; background:#666; color:#fff; padding:2px 5px; border-radius:3px; margin-right:5px; }
</style>
</head>
<body>
<div class="header"><h2 style="margin:0">🚗 第一駕訓班 — 名額查詢</h2></div>
<div class="controls">
  <div class="btn-group">
    <button class="pill active" id="cA" onclick="sw('cohort','A')">A 梯次</button>
    <button class="pill" id="cB" onclick="sw('cohort','B')">B 梯次</button>
  </div>
  <div class="btn-group">
    <button class="pill active" id="d0" onclick="sw('day',0)">一</button>
    <button class="pill" id="d1" onclick="sw('day',1)">二</button>
    <button class="pill" id="d2" onclick="sw('day',2)">三</button>
    <button class="pill" id="d3" onclick="sw('day',3)">四</button>
    <button class="pill" id="d4" onclick="sw('day',4)">五</button>
    <button class="pill" id="d5" onclick="sw('day',5)">六</button>
    <button class="pill" id="d6" onclick="sw('day',6)">日</button>
  </div>
</div>
<div id="content"></div>

<script>
const SHEET_ID = '1ZbOb5Ac8XEG0hoaNPs1wFdm5iWyi7XouBDZOP6Z6D7I';
const CONFIG_GID = '1565459234';

// 🛠️ 絕對精準座標：只抓有「白格子」的行，完全避開帶有時段文字的標題行
const WD_LAYOUT = [
  { label: '06:00–08:30 早班', rows: [5, 6, 7, 8] },
  { label: '08:30–11:00 第一批', rows: [10, 11, 12, 13] },
  { label: '10:00–12:30 暑期加開', rows: [15, 16, 17, 18] },
  { label: '12:00–14:30 第二批', rows: [20, 21, 22, 23] },
  { label: '13:30–16:00 暑期加開', rows: [25, 26, 27, 28] },
  { label: '15:30–18:00 第三批', rows: [30, 31, 32, 33] },
  { label: '18:30–21:00 晚班', rows: [35, 36, 37, 38] },
  { label: '19:00–21:00 第四批', rows: [40, 41, 42, 43] }
];

const WE_LAYOUT = [
  { label: '08:30–12:30 上午班', rows: [41, 42, 43, 44] },
  { label: '13:30–17:30 下午班', rows: [45, 46, 47, 48] }
];

let coaches = [], allData = {}, curC = 'A', curD = 0;

function isName(cell) {
  if (!cell) return false;
  // 徹底移除空白後判定
  let v = (cell.f || cell.v || "").toString().replace(/\s/g, "");
  if (v.length < 2) return false; // 長度不足不算
  
  // 只要包含以下字眼，通通視為「標籤」而非「人名」
  const black = ["—","──","─","-","_","0","null","不開放","假日","上午","下午","時段"];
  return !black.some(k => v.includes(k));
}

async function load() {
  try {
    const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${CONFIG_GID}`);
    const text = await res.text();
    const cfg = JSON.parse(text.substring(47, text.length - 2)).table.rows;
    coaches = cfg.map(r => ({
      name: (r.c[1]?.v || "").toString().trim(),
      cohort: (r.c[2]?.v || "").toString().includes('A') ? 'A' : 'B'
    })).filter(c => c.name && c.name !== "教練姓名");

    for (let c of coaches) {
      // 增加抓取範圍到 A1:L100
      const r = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(c.name)}&range=A1:L100`);
      const t = await r.text();
      allData[c.name] = JSON.parse(t.substring(47, t.length - 2)).table.rows;
    }
    render();
  } catch (e) { console.error(e); }
}

function render() {
  const isWE = curD >= 5;
  const layout = isWE ? WE_LAYOUT : WD_LAYOUT;
  const filtered = coaches.filter(c => c.cohort === curC);
  let html = '<div class="grid">';

  filtered.forEach(c => {
    const rows = allData[c.name] || [];
    let slotsHtml = '';
    layout.forEach(s => {
      let aU = 0, mU = 0;
      s.rows.forEach(rNum => {
        // 重要：rows 陣列是從 0 開始，所以 Excel 第 10 行是索引 9
        const row = rows[rNum - 1]; 
        if (row && row.c) {
          let colA = isWE ? (2 + (curD - 5) * 2) : (2 + curD * 2);
          let colM = colA + 1;
          if (isName(row.c[colA])) aU++;
          if (isName(row.c[colM])) mU++;
        }
      });
      const aR = 4 - aU, mR = 4 - mU;
      slotsHtml += `<div class="slot"><span style="font-size:11px;color:#666">${s.label}</span><div class="stat">
        <span><span class="label" style="background:#3498db">自</span><span class="rem ${aR<=0?'full':'ok'}">${aR<=0?'滿':'剩 '+aR}</span></span>
        <span><span class="label" style="background:#e67e22">手</span><span class="rem ${mR<=0?'full':'ok'}">${mR<=0?'滿':'剩 '+mR}</span></span>
      </div></div>`;
    });
    html += `<div class="card"><div class="coach-t">👤 ${c.name} 教練</div>${slotsHtml}</div>`;
  });
  document.getElementById('content').innerHTML = html + '</div>';
}

function sw(t, v) {
  if (t === 'cohort') curC = v; else curD = v;
  document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  document.getElementById('c' + curC).classList.add('active');
  document.getElementById('d' + curD).classList.add('active');
  render();
}
load();
</script>
</body>
</html>
