<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第一駕訓班 — 精準名額查詢</title>
<style>
  :root { --p:#1A1916; --acc:#27ae60; --bg:#F4F3EF; --c:#FFF; --b:#E0DDD5; }
  body { font-family:sans-serif; background:var(--bg); margin:0; padding:0; color:#333; }
  .header { background:var(--p); color:#fff; padding:15px; text-align:center; }
  .controls { background:var(--c); padding:10px; border-bottom:1px solid var(--b); text-align:center; position:sticky; top:0; z-index:100; }
  .group { margin-bottom: 8px; display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; }
  .pill { padding:6px 12px; border-radius:15px; border:1px solid var(--b); background:#fff; cursor:pointer; font-size:12px; font-weight:600; }
  .pill.active { background:var(--acc); color:#fff; border-color:var(--acc); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:15px; padding:15px; }
  .card { background:var(--c); border-radius:12px; padding:15px; border-top:5px solid var(--p); box-shadow:0 2px 8px rgba(0,0,0,0.1); }
  .coach-t { font-size:17px; font-weight:bold; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px; }
  .slot { background:#f9f9f9; padding:8px; border-radius:8px; margin-bottom:6px; font-size:13px; }
  .stat { display:flex; justify-content:space-between; margin-top:4px; }
  .rem { font-weight:bold; }
  .ok { color:var(--acc); }
  .full { color:#e74c3c; font-weight:bold; }
  .label { font-size:10px; background:#666; color:#fff; padding:2px 5px; border-radius:3px; margin-right:4px; }
</style>
</head>
<body>

<div class="header"><h2 style="margin:0">🚗 第一汽車駕訓班 — 名額查詢</h2></div>

<div class="controls">
  <div class="group">
    <button class="pill active" id="cA" onclick="sw('cohort','A')">A 梯次</button>
    <button class="pill" id="cB" onclick="sw('cohort','B')">B 梯次</button>
  </div>
  <div class="group">
    <button class="pill active" id="d0" onclick="sw('day',0)">週一</button>
    <button class="pill" id="d1" onclick="sw('day',1)">週二</button>
    <button class="pill" id="d2" onclick="sw('day',2)">週三</button>
    <button class="pill" id="d3" onclick="sw('day',3)">週四</button>
    <button class="pill" id="d4" onclick="sw('day',4)">週五</button>
    <button class="pill" id="dWE" onclick="sw('day','WE')">假日</button>
  </div>
</div>

<div id="content" class="grid"></div>

<script>
const SHEET_ID = '1ZbOb5Ac8XEG0hoaNPs1wFdm5iWyi7XouBDZOP6Z6D7I';
const CONFIG_GID = '1565459234';

// 鎖定 Excel 行號 (索引 = 行號-1)
const WD_LAYOUT = [
  { label: '06:00–08:30 早班', rows: [3, 4, 5, 6] },
  { label: '08:30–11:00 第一批', rows: [11, 12, 13, 14] },
  { label: '10:00–12:30 暑期A', rows: [19, 20, 21, 22] },
  { label: '12:00–14:30 第二批', rows: [23, 24, 25, 26] },
  { label: '13:30–16:00 暑期B', rows: [31, 32, 33, 34] },
  { label: '15:30–18:00 第三批', rows: [35, 36, 37, 38] },
  { label: '18:30–21:00 晚班', rows: [43, 44, 45, 46] },
  { label: '19:00–21:00 第四批', rows: [51, 52, 53, 54] }
];

const WE_LAYOUT = [
  { label: '08:30–12:30 假日上午', rows: [61, 62, 63, 64] },
  { label: '13:30–17:30 假日下午', rows: [69, 70, 71, 72] }
];

let coaches = [], allData = {}, curCohort = 'A', curDay = 0;

// ✨ 嚴格判定邏輯：排除 A 欄與 B 欄的影響
function isStudent(cell) {
  if (!cell) return false;
  let v = (cell.f || cell.v || "").toString().replace(/\s/g, "");
  // 如果是空、橫線、長度小於2，通通不算有人
  const ignore = ["","-","—","──","─","_","0","不開放","null"];
  return v.length >= 2 && !ignore.includes(v);
}

async function fetchJSON(gid, name) {
  let url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}`;
  if(name) url += `&sheet=${encodeURIComponent(name)}&range=A1:L80`;
  const res = await fetch(url);
  const text = await res.text();
  return JSON.parse(text.substring(47, text.length - 2)).table.rows;
}

async function load() {
  try {
    const cfg = await fetchJSON(CONFIG_GID);
    coaches = cfg.map(r => ({
      name: (r.c[1]?.v || "").toString().trim(),
      cohort: (r.c[2]?.v || "").toString().includes('A') ? 'A' : 'B'
    })).filter(c => c.name && c.name !== "教練姓名");

    await Promise.all(coaches.map(async (c) => {
      const rows = await fetchJSON(null, c.name);
      allData[c.name] = rows;
    }));
    render();
  } catch (e) { document.getElementById('content').innerHTML = "資料載入中..."; }
}

function render() {
  const isWE = curDay === 'WE';
  const layout = isWE ? WE_LAYOUT : WD_LAYOUT;
  const filtered = coaches.filter(c => c.cohort === curCohort);
  const container = document.getElementById('content');
  container.innerHTML = '';

  filtered.forEach(c => {
    const rows = allData[c.name] || [];
    let slotsHtml = '';
    
    layout.forEach(s => {
      let aU = 0, mU = 0;
      s.rows.forEach(idx => {
        const r = rows[idx];
        if (r && r.c) {
          if (!isWE) {
            // 平日：只看 C 到 L 欄 (索引 2 開始)
            if (isStudent(r.c[2 + (curDay * 2)])) aU++; 
            if (isStudent(r.c[3 + (curDay * 2)])) mU++;
          } else {
            // 假日：目前看週六
            if (isStudent(r.c[2])) aU++; if (isStudent(r.c[3])) mU++;
          }
        }
      });
      const aR = 4 - aU, mR = 4 - mU;
      slotsHtml += `<div class="slot"><b>${s.label}</b><div class="stat">
        <span><span class="label" style="background:#3498db">自</span><span class="rem ${aR<=0?'full':'ok'}">${aR<=0?'滿':'剩 '+aR}</span></span>
        <span><span class="label" style="background:#e67e22">手</span><span class="rem ${mR<=0?'full':'ok'}">${mR<=0?'滿':'剩 '+mR}</span></span>
      </div></div>`;
    });
    container.innerHTML += `<div class="card"><div class="coach-t">👤 ${c.name} 教練</div>${slotsHtml}</div>`;
  });
}

function sw(type, val) {
  if (type === 'cohort') curCohort = val; else curDay = val;
  document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  document.getElementById('c' + curCohort).classList.add('active');
  document.getElementById('d' + curDay).classList.add('active');
  render();
}
load();
</script>
</body>
</html>
