<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第一汽車駕訓班 — 即時課表查詢</title>
<style>
    :root { --bg: #f5f7fa; --primary: #2c3e50; --accent: #1abc9c; --auto: #3498db; --man: #e67e22; }
    body { font-family: "PingFang TC", sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #333; }
    .container { max-width: 1100px; margin: auto; }
    .header { background: var(--primary); color: white; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 15px; background: white; padding: 15px; border-radius: 12px; }
    select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; outline: none; min-width: 140px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
    .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid var(--accent); }
    .card-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
    .coach-name { font-size: 18px; font-weight: bold; }
    .type-tag { font-size: 12px; background: #e0f2f1; color: #00796b; padding: 2px 8px; border-radius: 4px; }
    .slot { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 8px; }
    .slot-time { font-size: 13px; font-weight: bold; color: #7f8c8d; margin-bottom: 5px; }
    .stats { display: flex; justify-content: space-between; align-items: center; }
    .label { font-size: 12px; padding: 2px 6px; border-radius: 4px; color: white; margin-right: 5px; }
    .l-auto { background: var(--auto); }
    .l-man { background: var(--man); }
    .rem { font-weight: bold; }
    .full { color: #e74c3c; }
    .ok { color: #27ae60; }
    .loading { text-align: center; padding: 50px; font-size: 18px; color: #95a5a6; }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0">🚗 第一汽車駕訓班課表</h2>
        <div style="font-size:12px; opacity:0.8; margin-top:5px">即時同步 Google 試算表 (每時段上限 4 位)</div>
    </div>

    <div class="controls">
        <select id="sel-batch"><option value="A">A 梯次</option><option value="B" selected>B 梯次</option></select>
        <select id="sel-class">
            <option value="全部">全部班別</option>
            <option value="平日班">平日班</option>
            <option value="假日班">假日班</option>
            <option value="平日假日">平日假日皆有</option>
        </select>
        <button onclick="init()" style="background:var(--accent); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer">刷新資料</button>
    </div>

    <div id="loading" class="loading">正在連線至雲端資料庫...</div>
    <div id="content" class="grid"></div>
</div>

<script>
const SPREADSHEET_ID = '1ZbOb5Ac8XEG0hoaNPs1wFdm5iWyi7XouBDZOP6Z6D7I';
const CONFIG_GID = '1565459234'; // 您提供的最新設定頁 GID
const LIMIT = 4;

const TIME_SLOTS = [
    "06:00–08:30 早班", "08:30–11:00 第一批", "10:00–12:30 暑期加開",
    "12:00–14:30 第二批", "13:30–16:00 暑期加開", "15:30–18:00 第三批",
    "18:30–21:00 晚班", "19:00–21:00 第四批"
];

let coaches = [];
let allSchedules = {};

async function fetchAPI(gid, sql) {
    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&tq=${encodeURIComponent(sql)}&gid=${gid}`;
    const resp = await fetch(url);
    const text = await resp.text();
    return JSON.parse(text.substring(47, text.length - 2)).table.rows;
}

async function init() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('content').innerHTML = '';
    try {
        // 從設定頁讀取教練配置
        const rows = await fetchAPI(CONFIG_GID, "select B, C, D, E");
        coaches = rows.map(r => ({
            name: r.c[0]?.v,
            cohort: r.c[1]?.v?.includes('A') ? 'A' : 'B',
            type: r.c[2]?.v || '未設定',
            gid: r.c[3]?.v
        })).filter(c => c.name && c.gid);

        // 同步抓取所有教練分頁資料
        await Promise.all(coaches.map(async (c) => {
            try {
                allSchedules[c.name] = await fetchAPI(c.gid, "select * offset 1");
            } catch (e) { console.error(c.name + " 載入失敗"); }
        }));

        document.getElementById('loading').style.display = 'none';
        render();
    } catch (e) {
        document.getElementById('loading').innerText = "⚠️ 連線失敗！請確認試算表已開啟「發佈到網路」。";
    }
}

function render() {
    const batch = document.getElementById('sel-batch').value;
    const type = document.getElementById('sel-class').value;
    const container = document.getElementById('content');
    container.innerHTML = '';

    const filtered = coaches.filter(c => {
        const batchMatch = c.cohort === batch;
        const typeMatch = (type === '全部') || (c.type.includes(type)) || (type === '平日班' && c.type === '平日假日');
        return batchMatch && typeMatch;
    });

    filtered.forEach(coach => {
        let html = `<div class="card">
            <div class="card-title">
                <span class="coach-name">${coach.name} 教練</span>
                <span class="type-tag">${coach.type}</span>
            </div>`;
        
        const data = allSchedules[coach.name] || [];
        
        TIME_SLOTS.forEach(timeKey => {
            const row = data.find(r => r.c[0]?.v && r.c[0].v.includes(timeKey.split(' ')[0]));
            let aCount = 0, mCount = 0;
            
            if (row) {
                // 檢查週一到週五的自排與手排欄位
                for (let i = 0; i < 5; i++) {
                    if (row.c[2 + (i * 2)]?.v) aCount++;
                    if (row.c[3 + (i * 2)]?.v) mCount++;
                }
            }
            
            const aRem = Math.max(0, LIMIT - aCount);
            const mRem = Math.max(0, LIMIT - mCount);

            html += `<div class="slot">
                <div class="slot-time">🕒 ${timeKey}</div>
                <div class="stats">
                    <span><span class="label l-auto">自</span> <span class="rem ${aRem===0?'full':'ok'}">${aRem===0?'滿':'剩 '+aRem}</span></span>
                    <span><span class="label l-man">手</span> <span class="rem ${mRem===0?'full':'ok'}">${mRem===0?'滿':'剩 '+mRem}</span></span>
                </div>
            </div>`;
        });
        
        html += `</div>`;
        container.innerHTML += html;
    });
}

document.getElementById('sel-batch').onchange = render;
document.getElementById('sel-class').onchange = render;

init();
</script>
</body>
</html>
