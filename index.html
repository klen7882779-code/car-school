<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>第一汽車駕訓班 - 排課查詢系統</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; background: #eee; padding: 15px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #007bff; color: white; }
        .auto-tag { color: #007bff; font-weight: bold; }
        .manual-tag { color: #dc3545; font-weight: bold; }
        .loading { text-align: center; color: #666; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>第一汽車駕訓班 - 即時課表</h2>
    <div class="controls">
        <select id="sel-batch"><option value="A">A梯</option><option value="B" selected>B梯</option></select>
        <select id="sel-coach"><option value="">載入教練名單中...</option></select>
    </div>
    <div id="status" class="loading">正在連線 Google 試算表...</div>
    <div id="table-area" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th>時段</th><th>週一</th><th>週二</th><th>週三</th><th>週四</th><th>週五</th><th>週六</th>
                </tr>
            </thead>
            <tbody id="sched-body"></tbody>
        </table>
    </div>
</div>

<script>
const SPREADSHEET_ID = '1ZbOb5Ac8XEG0hoaNPs1wFdm5iWyi7XouBDZOP6Z6D7I';
const SETTING_GID = '1201782600';

// 修正：完全對齊照片中的 Excel 文字
const SLOTS = [
    {key: '06:00 - 06:50', label: '06:00-06:50'},
    {key: '06:50 - 07:40', label: '06:50-07:40'},
    {key: '07:40 - 08:30', label: '07:40-08:30'},
    {key: '08:30 - 09:20', label: '08:30-09:20'},
    {key: '09:20 - 10:10', label: '09:20-10:10'},
    {key: '10:10 - 11:00', label: '10:10-11:00'}
];

let allCoaches = [];

async function fetchSheet(gid, query = "select *") {
    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&tq=${encodeURIComponent(query)}&gid=${gid}`;
    const resp = await fetch(url);
    const text = await resp.text();
    return JSON.parse(text.substring(47, text.length - 2)).table.rows;
}

async function init() {
    try {
        const rows = await fetchSheet(SETTING_GID, "select B, C, D, E");
        allCoaches = rows.map(r => ({
            name: r.c[0]?.v,
            batch: r.c[1]?.v?.replace('梯','').trim(),
            gid: r.c[3]?.v
        })).filter(c => c.name && c.gid);
        updateList();
    } catch (e) {
        document.getElementById('status').innerText = "讀取設定失敗，請確認試算表已發佈且開啟權限。";
    }
}

function updateList() {
    const b = document.getElementById('sel-batch').value;
    const filtered = allCoaches.filter(c => c.batch === b);
    const sel = document.getElementById('sel-coach');
    sel.innerHTML = filtered.map(c => `<option value="${c.gid}">${c.name}</option>`).join('');
    if(filtered.length > 0) loadSchedule(filtered[0].gid);
}

async function loadSchedule(gid) {
    document.getElementById('status').style.display = 'block';
    document.getElementById('table-area').style.display = 'none';
    try {
        const rows = await fetchSheet(gid, "select * offset 1");
        render(rows);
        document.getElementById('status').style.display = 'none';
        document.getElementById('table-area').style.display = 'block';
    } catch (e) {
        document.getElementById('status').innerText = "課表載入失敗。";
    }
}

function render(rows) {
    const tbody = document.getElementById('sched-body');
    tbody.innerHTML = '';
    SLOTS.forEach(slot => {
        let tr = `<tr><td style="background:#f9f9f9;font-weight:bold">${slot.label}</td>`;
        const rowData = rows.find(r => r.c[0]?.v === slot.key);
        for (let i = 0; i < 6; i++) {
            const autoV = rowData?.c[2+(i*2)]?.v || '';
            const manualV = rowData?.c[3+(i*2)]?.v || '';
            tr += `<td>`;
            if(autoV) tr += `<div class="auto-tag">自: ${autoV}</div>`;
            if(manualV) tr += `<div class="manual-tag">手: ${manualV}</div>`;
            tr += `</td>`;
        }
        tbody.innerHTML += tr + `</tr>`;
    });
}

document.getElementById('sel-batch').onchange = updateList;
document.getElementById('sel-coach').onchange = (e) => loadSchedule(e.target.value);
init();
</script>
</body>
</html>
