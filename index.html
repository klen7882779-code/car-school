<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第一汽車駕訓班 — 名額查詢</title>
<style>
  :root { --p:#1A1916; --acc:#27ae60; --bg:#F4F3EF; --c:#FFF; --b:#E0DDD5; }
  body { font-family:sans-serif; background:var(--bg); margin:0; padding:0; color:#333; }
  .header { background:var(--p); color:#fff; padding:18px; text-align:center; position:sticky; top:0; z-index:100; }
  .controls { background:var(--c); padding:12px; border-bottom:1px solid var(--b); display:flex; justify-content:center; gap:8px; position:sticky; top:65px; z-index:90; }
  .pill { padding:6px 14px; border-radius:20px; border:1px solid var(--b); background:#fff; cursor:pointer; font-size:12px; font-weight:600; }
  .pill.active { background:var(--p); color:#fff; border-color:var(--p); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:15px; padding:15px; max-width:1100px; margin:auto; }
  .card { background:var(--c); border:1px solid var(--b); border-radius:12px; padding:15px; border-top:5px solid var(--acc); box-shadow:0 2px 8px rgba(0,0,0,0.05); }
  .coach-t { font-size:17px; font-weight:bold; border-bottom:1px solid #eee; padding-bottom:8px; margin-bottom:12px; }
  .slot { background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:8px; }
  .slot-time { font-size:11px; font-weight:bold; color:#666; margin-bottom:6px; display:block; }
  .stat { display:flex; justify-content:space-between; }
  .rem { font-weight:bold; font-size:15px; }
  .rem-ok { color:#27ae60; }
  .rem-full { color:#e74c3c; font-weight:900; }
  .label { font-size:10px; background:#666; color:#fff; padding:2px 5px; border-radius:3px; margin-right:5px; }
</style>
</head>
<body>
<div class="header"><h2 style="margin:0">🚗 第一汽車駕訓班 — 名額查詢</h2></div>
<div class="controls">
  <button class="pill active" id="btnA" onclick="sw('cohort','A')">A 梯次</button>
  <button class="pill" id="btnB" onclick="sw('cohort','B')">B 梯次</button>
  <div style="width:1px; background:#ddd; height:20px; margin:0 5px"></div>
  <button class="pill active" id="btnWD" onclick="sw('day','WD')">平日</button>
  <button class="pill" id="btnWE" onclick="sw('day','WE')">假日</button>
</div>
<div id="content"><div style="text-align:center;padding:50px;color:#999">資料載入中...</div></div>

<script>
const SHEET_ID = '1ZbOb5Ac8XEG0hoaNPs1wFdm5iWyi7XouBDZOP6Z6D7I';
const CONFIG_GID = '1565459234';

// 鎖定 Excel 物理行數
const WD_LAYOUT = [
  { label: '06:00–08:30 早班', rows: [3, 4, 5, 6] },
  { label: '08:30–11:00 第一批', rows: [11, 12, 13, 14] },
  { label: '10:00–12:30 暑期A', rows: [19, 20] },
  { label: '12:00–14:30 第二批', rows: [23, 24, 25, 26] },
  { label: '13:30–16:00 暑期B', rows: [31, 32] },
  { label: '15:30–18:00 第三批', rows: [35, 36, 37, 38] },
  { label: '18:30–21:00 晚班', rows: [43, 44, 45, 46] },
  { label: '19:00–21:00 第四批', rows: [51, 52, 53, 54] }
];
const WE_LAYOUT = [
  { label: '08:30–12:30 假日上午', rows: [61, 62, 63, 64] },
  { label: '13:30–17:30 假日下午', rows: [69, 70, 71, 72] }
];

let coaches = [], allData = {}, cohort = 'A', dayType = 'WD';

async function fetchJSON(gid, sheetName, range) {
  let url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
  if (gid) url += `&gid=${gid}`;
  if (sheetName) url += `&sheet=${encodeURIComponent(sheetName)}`;
  if (range) url += `&range=${range}`;
  const res = await fetch(url);
  const text = await res.text();
  return JSON.parse(text.substring(47, text.length - 2)).table.rows;
}

// 🛡️ 究極偵測函數：排除一切非姓名內容
function isRealName(cell) {
  if (!cell || cell.v === null || cell.v === undefined) return false;
  
  // 取得顯示的文字內容並移除所有空白
  let val = (cell.f || cell.v || "").toString().replace(/\s/g, "");
  
  // 1. 如果長度小於 2，且不是特定的單字名，通常不是姓名
  if (val.length === 0) return false;
  
  // 2. 排除掉所有的符號、數字
  const ignoreList = ["-", "—", "──", "─", "_", "0", "None", "null", "undefined", ".", "。"];
  if (ignoreList.includes(val)) return false;
  
  // 3. 額外檢查：如果內容只包含符號或空格，也不算
  if (/^[ \-—─0]+$/.test(val)) return false;

  return true; 
}

async function load() {
  try {
    const cfgRows = await fetchJSON(CONFIG_GID, null, "B2:F100");
    coaches = cfgRows.map(r => ({
      name: (r.c[0]?.v || "").toString().trim(),
      cohort: (r.c[1]?.v || "").toString().includes('A') ? 'A' : 'B',
      type: (r.c[2]?.v || 'WDWE').toString().toUpperCase(),
      cap: parseInt(r.c[4]?.v) || 4 
    })).filter(c => c.name !== "");

    await Promise.all(coaches.map(async (c) => {
      try {
        const rows = await fetchJSON(null, c.name, "A1:L80");
        allData[c.name] = rows;
      } catch (e) { console.error(c.name); }
    }));
    render();
  } catch (e) { console.error(e); }
}

function render() {
  const layout = dayType === 'WD' ? WD_LAYOUT : WE_LAYOUT;
  const filtered = coaches.filter(c => c.cohort === cohort && c.type.includes(dayType));
  const container = document.getElementById('content');
  container.innerHTML = '';

  let html = '<div class="grid">';
  filtered.forEach(c => {
    const rows = allData[c.name] || [];
    let slotsHtml = '';
    layout.forEach(s => {
      let aUsed = 0, mUsed = 0;
      s.rows.forEach(idx => {
        const r = rows[idx];
        if (r && r.c) {
          const days = dayType === 'WD' ? 5 : 2;
          for (let d = 0; d < days; d++) {
            if (isRealName(r.c[2 + (d * 2)])) aUsed++;
            if (isRealName(r.c[3 + (d * 2)])) mUsed++;
          }
        }
      });
      const aR = Math.max(0, c.cap - aUsed), mR = Math.max(0, c.cap - mUsed);
      slotsHtml += `<div class="slot"><span class="slot-time">🕒 ${s.label}</span><div class="stat">
        <span><span class="label" style="background:#3498db">自</span><span class="rem ${aR===0?'rem-full':'rem-ok'}">${aR===0?'已滿':'剩 '+aR}</span></span>
        <span><span class="label" style="background:#e67e22">手</span><span class="rem ${mR===0?'rem-full':'rem-ok'}">${mR===0?'已滿':'剩 '+mR}</span></span>
      </div></div>`;
    });
    html += `<div class="card"><div class="coach-t">👤 ${c.name} 教練</div>${slotsHtml}</div>`;
  });
  container.innerHTML = html + '</div>';
}

function sw(k,v){ 
  if(k==='cohort') cohort=v; else dayType=v;
  document.getElementById('btnA').className = 'pill' + (cohort==='A'?' active':'');
  document.getElementById('btnB').className = 'pill' + (cohort==='B'?' active':'');
  document.getElementById('btnWD').className = 'pill' + (dayType==='WD'?' active':'');
  document.getElementById('btnWE').className = 'pill' + (dayType==='WE'?' active':'');
  render();
}
load();
</script>
</body>
</html>
