<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第一汽車駕訓班 — 每日名額查詢</title>
<style>
  :root { --p:#1A1916; --acc:#27ae60; --bg:#F4F3EF; --c:#FFF; --b:#E0DDD5; }
  body { font-family:sans-serif; background:var(--bg); margin:0; padding:0; color:#333; }
  .header { background:var(--p); color:#fff; padding:15px; text-align:center; position:sticky; top:0; z-index:100; }
  .controls { background:var(--c); padding:10px; border-bottom:1px solid var(--b); display:flex; flex-direction:column; align-items:center; gap:8px; position:sticky; top:60px; z-index:90; }
  .btn-group { display:flex; gap:5px; flex-wrap:wrap; justify-content:center; }
  .pill { padding:5px 12px; border-radius:15px; border:1px solid var(--b); background:#fff; cursor:pointer; font-size:12px; font-weight:600; }
  .pill.active { background:var(--p); color:#fff; border-color:var(--p); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:15px; padding:15px; max-width:1100px; margin:auto; }
  .card { background:var(--c); border:1px solid var(--b); border-radius:12px; padding:15px; border-top:5px solid var(--acc); box-shadow:0 2px 8px rgba(0,0,0,0.05); }
  .coach-t { font-size:16px; font-weight:bold; border-bottom:1px solid #eee; padding-bottom:8px; margin-bottom:10px; }
  .slot { background:#f9f9f9; padding:8px; border-radius:8px; margin-bottom:6px; }
  .slot-time { font-size:11px; font-weight:bold; color:#666; margin-bottom:4px; display:block; }
  .stat { display:flex; justify-content:space-between; }
  .rem { font-weight:bold; font-size:14px; }
  .rem-ok { color:#27ae60; }
  .rem-full { color:#e74c3c; font-weight:900; }
  .label { font-size:10px; background:#666; color:#fff; padding:2px 5px; border-radius:3px; margin-right:5px; }
</style>
</head>
<body>
<div class="header"><h2 style="margin:0">🚗 第一駕訓班 — 每日名額</h2></div>

<div class="controls">
  <div class="btn-group">
    <button class="pill active" id="bA" onclick="sw('cohort','A')">A 梯</button>
    <button class="pill" id="bB" onclick="sw('cohort','B')">B 梯</button>
  </div>
  <div class="btn-group" id="day-selector">
    <button class="pill active" id="d0" onclick="sw('day',0)">週一</button>
    <button class="pill" id="d1" onclick="sw('day',1)">週二</button>
    <button class="pill" id="d2" onclick="sw('day',2)">週三</button>
    <button class="pill" id="d3" onclick="sw('day',3)">週四</button>
    <button class="pill" id="d4" onclick="sw('day',4)">週五</button>
    <button class="pill" id="d5" onclick="sw('day','WE')">假日</button>
  </div>
</div>

<div id="content"></div>

<script>
const SHEET_ID = '1ZbOb5Ac8XEG0hoaNPs1wFdm5iWyi7XouBDZOP6Z6D7I';
const CONFIG_GID = '1565459234';

// 物理座標鎖定 (行號)
const WD_LAYOUT = [
  { label: '06:00–08:30 早班', rows: [3, 4, 5, 6] },
  { label: '08:30–11:00 第一批', rows: [11, 12, 13, 14] },
  { label: '10:00–12:30 暑期A', rows: [19, 20, 21, 22] },
  { label: '12:00–14:30 第二批', rows: [23, 24, 25, 26] },
  { label: '13:30–16:00 暑期B', rows: [31, 32, 33, 34] },
  { label: '15:30–18:00 第三批', rows: [35, 36, 37, 38] },
  { label: '18:30–21:00 晚班', rows: [43, 44, 45, 46] },
  { label: '19:00–21:00 第四批', rows: [51, 52, 53, 54] }
];

const WE_LAYOUT = [
  { label: '08:30–12:30 假日上午', rows: [61, 62, 63, 64] },
  { label: '13:30–17:30 假日下午', rows: [69, 70, 71, 72] }
];

let coaches = [], allData = {}, curCohort = 'A', curDay = 0; // 0=週一

function isName(cell) {
  if (!cell) return false;
  let v = (cell.f || cell.v || "").toString().replace(/\s/g, "");
  return v.length >= 2 && !["","-","—","──","─","_","0",".","。","null","不開放"].includes(v);
}

async function fetchSheet(gid, name) {
  let url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}`;
  if(name) url += `&sheet=${encodeURIComponent(name)}`;
  const res = await fetch(url);
  const text = await res.text();
  return JSON.parse(text.substring(47, text.length - 2)).table.rows;
}

async function load() {
  try {
    const cfg = await fetchSheet(CONFIG_GID);
    coaches = cfg.map(r => ({
      name: (r.c[1]?.v || "").toString().trim(),
      cohort: (r.c[2]?.v || "").toString().includes('A') ? 'A' : 'B'
    })).filter(c => c.name && c.name !== "教練姓名");

    await Promise.all(coaches.map(async (c) => {
      const rows = await fetchSheet(null, c.name);
      allData[c.name] = rows;
    }));
    render();
  } catch (e) { console.error(e); }
}

function render() {
  const isWE = curDay === 'WE';
  const layout = isWE ? WE_LAYOUT : WD_LAYOUT;
  const filtered = coaches.filter(c => c.cohort === curCohort);
  let html = '<div class="grid">';

  filtered.forEach(c => {
    const rows = allData[c.name] || [];
    let slotsHtml = '';
    layout.forEach(s => {
      let aU = 0, mU = 0;
      s.rows.forEach(idx => {
        const r = rows[idx];
        if (r && r.c) {
          // 如果是平日，根據 curDay (0-4) 決定看哪一欄
          // 如果是假日， curDay 為 WE，我們看週六(d=0)跟週日(d=1)
          if (!isWE) {
            if (isName(r.c[2 + (curDay * 2)])) aU++; 
            if (isName(r.c[3 + (curDay * 2)])) mU++;
          } else {
            // 假日邏輯：這裡暫定顯示週六(d=0)名額
            if (isName(r.c[2])) aU++; if (isName(r.c[3])) mU++;
          }
        }
      });
      const aR = 4 - aU, mR = 4 - mU;
      slotsHtml += `<div class="slot"><span class="slot-time">${s.label}</span><div class="stat">
        <span><span class="label" style="background:#3498db">自</span><span class="rem ${aR<=0?'rem-full':'rem-ok'}">${aR<=0?'滿':'剩 '+aR}</span></span>
        <span><span class="label" style="background:#e67e22">手</span><span class="rem ${mR<=0?'rem-full':'rem-ok'}">${mR<=0?'滿':'剩 '+mR}</span></span>
      </div></div>`;
    });
    html += `<div class="card"><div class="coach-t">👤 ${c.name}</div>${slotsHtml}</div>`;
  });
  document.getElementById('content').innerHTML = html + '</div>';
}

function sw(type, val) {
  if (type === 'cohort') curCohort = val;
  else curDay = val;
  
  // 更新按鈕樣式
  document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
  document.getElementById('b' + curCohort).classList.add('active');
  document.getElementById('d' + curDay).classList.add('active');
  render();
}

load();
</script>
</body>
</html>
